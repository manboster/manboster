name: CodeQL

on:
  push:
    branches:
      - master
      - dev
    paths-ignore:
      - "*.md"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  checks: write
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          source-root: .

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
