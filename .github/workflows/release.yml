name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Determine Release Channel
        run: |
            TAG="${{ github.ref_name }}"
            if [[ "$TAG" == *"-rc"* ]]; then
              echo "CHANNEL=rc" >> $GITHUB_ENV
            elif [[ "$TAG" == *"-beta"* ]]; then
              echo "CHANNEL=beta" >> $GITHUB_ENV
            elif [[ "$TAG" == *"-alpha"* ]]; then
              echo "CHANNEL=alpha" >> $GITHUB_ENV
            else
              echo "CHANNEL=stable" >> $GITHUB_ENV
            fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}